resources:
  jobs:
    og_orchestrator_workers:
      name: "OG - Orchestrator-Workers (Well Performance Investigation)"
      description: "Orchestrator LLM reads well data and determines at runtime which analyses to run. Workers execute each investigation independently, then findings are synthesised into a root cause recommendation."
      tags:
        project: og-agentic-patterns
        managed_by: databricks-asset-bundles
        pattern: orchestrator-workers

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - openai

      tasks:
        - task_key: run_orchestrator_workers_notebook
          notebook_task:
            notebook_path: ../databricks/og_orchestrator_workers.ipynb
          environment_key: default

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
