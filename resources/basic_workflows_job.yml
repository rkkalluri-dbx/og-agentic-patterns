resources:
  jobs:
    basic_workflows:
      name: "OG - Basic Workflows (Parallelization + Routing)"
      description: "Demonstrates parallelization (multi-stakeholder analysis) and routing (support ticket triage) patterns."
      tags:
        project: og-agentic-patterns
        managed_by: databricks-asset-bundles
        pattern: parallelization-routing

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - openai

      tasks:
        - task_key: run_basic_workflows_notebook
          notebook_task:
            notebook_path: ../databricks/basic_workflows.ipynb
          environment_key: default

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
